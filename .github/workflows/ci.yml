name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-sqlite:
    name: pytest (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest
        env:
          DATABASE_URL: "sqlite:///./ci_test.db"
          JWT_SECRET: "ci-test-secret"
          JWT_EXPIRE_MINUTES: "60"

  test-postgres-audit-trigger:
    name: pytest (Postgres audit_log trigger)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: po_app
          POSTGRES_PASSWORD: po_app
          POSTGRES_DB: po_workflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U po_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      # research.md Decision 3 Resolution: verifies the BEFORE UPDATE/DELETE
      # trigger actually fires on a real Postgres backend, since SQLite (the
      # test-sqlite job above) cannot enforce it at the database level.
      - run: pytest tests/test_audit_log_immutability.py
        env:
          DATABASE_URL: "postgresql+psycopg2://po_app:po_app@localhost:5432/po_workflow"
          JWT_SECRET: "ci-test-secret"
          JWT_EXPIRE_MINUTES: "60"
