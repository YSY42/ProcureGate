services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: po_app
      POSTGRES_PASSWORD: po_app
      POSTGRES_DB: po_workflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U po_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://po_app:po_app@postgres:5432/po_workflow
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts

volumes:
  postgres_data:
